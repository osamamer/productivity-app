databaseChangeLog:
  # Add user_id to day_entity table
  - changeSet:
      id: 013-add-user-id-to-day-entity
      author: osama
      comment: Add user_id foreign key to day_entity table
      changes:
        - addColumn:
            tableName: day_entity
            columns:
              - column:
                  name: user_id
                  type: varchar(255)
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: day_entity
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_day_entity_user
            onDelete: CASCADE
            onUpdate: CASCADE
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: day_entity
            constraintName: fk_day_entity_user
        - dropColumn:
            tableName: day_entity
            columnName: user_id

