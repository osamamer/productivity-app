  # Add composite indexes for common query patterns
  - changeSet:
      id: 013-add-composite-user-indexes
      author: osama
      comment: Add composite indexes for common user-scoped queries
      changes:
        - createIndex:
            tableName: task
            indexName: idx_task_user_completed
            columns:
              - column:
                  name: user_id
              - column:
                  name: completed
        - createIndex:
            tableName: task
            indexName: idx_task_user_scheduled_date
            columns:
              - column:
                  name: user_id
              - column:
                  name: scheduled_perform_date_time
        - createIndex:
            tableName: day_entity
            indexName: idx_day_entity_user_date
            unique: true
            columns:
              - column:
                  name: user_id
              - column:
                  name: local_date
        - createIndex:
            tableName: pomodoro
            indexName: idx_pomodoro_user_active
            columns:
              - column:
                  name: user_id
              - column:
                  name: is_active